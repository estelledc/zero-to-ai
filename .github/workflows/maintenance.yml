name: Weekly maintenance report

on:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Content freshness report
        continue-on-error: true
        run: npm run audit:content-freshness 2>&1 | tee freshness-report.txt
      - name: Official link report
        continue-on-error: true
        run: npm run audit:official-links 2>&1 | tee official-links.log
      - name: Dependency advisory report
        continue-on-error: true
        run: npm audit --json > dependency-audit.json
      - name: Upload maintenance reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: maintenance-${{ github.run_id }}
          path: |
            freshness-report.txt
            official-links.log
            dependency-audit.json
            artifacts/maintenance/official-link-report.json
          if-no-files-found: warn
          retention-days: 30
