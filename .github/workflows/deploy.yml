name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Run validation for stacked/release-branch PRs too. Deployment remains main-only below.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Validate cross-references
        run: npm run validate-refs
      - name: Audit content freshness
        run: npm run audit:content-freshness
      - name: Type check
        run: npm run check
      - name: Validate Claude fixtures
        run: npm run test:fixtures
      - name: Validate Codex docs
        run: npm run test:codex-docs
      - name: Unit tests
        run: npm run test:unit
      - name: Verify published skill pack
        run: npm run verify:skill-pack

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: withastro/action@e84f40bd8d2caa9e768ec82ad30dd81f0b280853 # v6
        with:
          node-version: 22
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npm run test:e2e:run
      - name: Upload pull-request build
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zero-to-ai-pr-${{ github.event.number }}
          path: dist
          retention-days: 7

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
